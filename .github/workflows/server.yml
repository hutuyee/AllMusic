name: AllMusic Server

on:
  push:
    branches:
      - 'releases/**'
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build_server:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build server
        if: ${{ !contains(github.ref_name, '-paper') }}
        shell: cmd
        run: |
          gradlew :server:buildServer

      - name: Build paper
        if: ${{ contains(github.ref_name, '-paper') }}
        shell: cmd
        run: |
          gradlew :paper:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "allmusic_server"
          path: |
            build/
            paper/build/libs/*.jar
          if-no-files-found: warn

      - name: Create Pre-release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, 'debug')
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          tag_name: ${{ github.ref_name }}
          name: "Pre-release ${{ github.ref_name }}"
          body: "自动构建的预发布版本"
          files: |
            build/*.jar
            paper/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}